<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>گالری فیلم‌ها + پخش‌کننده</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg1:#0f2027; --bg2:#203a43; --bg3:#2c5364; --card:#111; --accent:#00e6e6;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background: linear-gradient(120deg,var(--bg3),var(--bg2),var(--bg1));
      color:#fff;
    }
    header{
      padding:24px 16px; text-align:center; font-weight:700; font-size:clamp(20px,3vw,30px);
      color:var(--accent);
    }
    .grid{
      display:grid; gap:18px; padding:18px; max-width:1200px; margin:0 auto;
      grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    }
    .card{
      background:#121212d0; border:1px solid #1f1f1f; border-radius:var(--radius);
      overflow:hidden; box-shadow:0 8px 28px rgba(0,0,0,.35);
      transition:transform .25s ease, box-shadow .25s ease; cursor:pointer;
    }
    .card:hover{ transform:translateY(-4px); box-shadow:0 14px 40px rgba(0,0,0,.5); }
    .card img{ width:100%; display:block; aspect-ratio:2/3; object-fit:cover; }
    .title{ text-align:center; padding:10px 8px; font-size:14px }
    /* Modal */
    .modal{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(0,0,0,.82); z-index:1000; padding:16px;
    }
    .modal.open{ display:flex; }
    .modal-inner{
      position:relative; width:min(100%, 900px); background:#000; border-radius:16px;
      overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,.6);
    }
    .controls{
      position:absolute; inset:10px 10px auto auto; display:flex; gap:8px; z-index:2;
    }
    .btn{
      appearance:none; border:0; padding:8px 12px; border-radius:10px; cursor:pointer;
      background:rgba(0,0,0,.55); color:#fff; font-weight:600; backdrop-filter:saturate(1.2) blur(2px);
    }
    .btn:hover{ background:rgba(0,0,0,.75); }
    video{
      display:block; width:100%; height:auto; background:#000;
      /* برای آیفون */
      playsinline:playsinline;
    }
    .hint{ text-align:center; opacity:.75; font-size:12px; margin:6px 0 14px }
    @media (max-width:520px){
      .grid{ gap:12px; padding:12px; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); }
      .title{ font-size:12px }
    }
    footer{ text-align:center; padding:16px; color:#b7b7b7; font-size:12px }
    a,button{ font-family:inherit }
  </style>
</head>
<body>

  <header>🎬 گالری فیلم‌ها</header>

  <div class="grid">
    <figure class="card" data-action="play-avengers">
      <img src="https://m.media-amazon.com/images/I/71lADxngTWS._AC_SL1050_.jpg" alt="Avengers: Endgame">
      <figcaption class="title">Avengers: Endgame</figcaption>
    </figure>

    <figure class="card">
      <img src="https://i.ibb.co/3CFz9R9/spongebob.jpg" alt="SpongeBob Movie">
      <figcaption class="title">SpongeBob Movie</figcaption>
    </figure>

    <figure class="card">
      <img src="https://i.ibb.co/LgJbWLP/running-man.jpg" alt="The Running Man">
      <figcaption class="title">The Running Man</figcaption>
    </figure>

    <figure class="card">
      <img src="https://i.ibb.co/PM1XxHB/how-to-train-dragon.jpg" alt="How to Train Your Dragon">
      <figcaption class="title">How to Train Your Dragon</figcaption>
    </figure>

    <figure class="card">
      <img src="https://files.fm/thumb_show.php?i=dc8njr5cy4" alt="Black Widow">
      <figcaption class="title">Black Widow</figcaption>
    </figure>

    <figure class="card">
      <img src="https://files.fm/thumb_show.php?i=wv4h9hfz2p" alt="Venom: Let There Be Carnage">
      <figcaption class="title">Venom: Let There Be Carnage</figcaption>
    </figure>

    <figure class="card">
      <img src="https://files.fm/thumb_show.php?i=bs4x2b3z9z" alt="Shang-Chi and the Legend of the Ten Rings">
      <figcaption class="title">Shang-Chi and the Legend of the Ten Rings</figcaption>
    </figure>
  </div>

  <p class="hint">برای پخش، روی پوستر Avengers: Endgame کلیک کنید</p>

  <!-- Modal Player -->
  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-label="Video player dialog">
    <div class="modal-inner">
      <div class="controls">
        <button class="btn" id="fsBtn" title="تمام‌صفحه">⛶</button>
        <button class="btn" id="closeBtn" title="بستن">✕</button>
      </div>
      <video id="player" controls preload="metadata" playsinline
             poster="https://m.media-amazon.com/images/I/71lADxngTWS._AC_SL1050_.jpg">
        <source src="https://ia800509.us.archive.org/4/items/7587-video-938x-1668-1754010085/7587_video_938x1668_1754010085.mp4" type="video/mp4">
        مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
      </video>
    </div>
  </div>

  <footer>© Movie Gallery</footer>

  <script>
    const modal = document.getElementById('modal');
    const player = document.getElementById('player');
    const fsBtn  = document.getElementById('fsBtn');
    const closeBtn = document.getElementById('closeBtn');

    // باز کردن مودال با کلیک روی پوستر Avengers
    document.querySelector('[data-action="play-avengers"]').addEventListener('click', () => {
      modal.classList.add('open');
      modal.setAttribute('aria-hidden','false');
      // شروع پخش پس از باز شدن (کاربر-اینتراکشن انجام شده)
      player.play().catch(()=>{ /* بعضی مرورگرها اجازه autoplay نمیدن */ });
    });

    // بستن مودال
    function closeModal(){
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden','true');
      player.pause();
      // برای آزاد کردن بافر، اگر خواستی زمان رو صفر کن:
      // player.currentTime = 0;
      if (document.fullscreenElement) document.exitFullscreen?.();
      if (document.webkitFullscreenElement) document.webkitExitFullscreen?.();
    }
    closeBtn.addEventListener('click', closeModal);
    // کلیک روی پس‌زمینه
    modal.addEventListener('click', (e)=>{
      if (e.target === modal) closeModal();
    });
    // ESC
    document.addEventListener('keydown', (e)=>{
      if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });

    // دکمه تمام‌صفحه (Fullscreen) — روی خود <video>
    fsBtn.addEventListener('click', ()=>{
      const v = player;
      if (v.requestFullscreen) v.requestFullscreen();
      else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();   // Safari
      else if (v.msRequestFullscreen) v.msRequestFullscreen();           // IE11
      else if (v.webkitEnterFullscreen) v.webkitEnterFullscreen();       // iOS Safari
    });
  </script>
</body>
</html>
